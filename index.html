            padding: 20px;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            padding: 30px;

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;

        .subtitle {

            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .content {
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
        }

        .map-container {
            flex: 1;
            min-width: 600px;
            border: 2px solid #ddd;
            border-radius: 8px;
            background: white;
            overflow: hidden;
        }

        #map {
            width: 100%;
            height: 700px;
            border-radius: 8px;
        }

        .info-panel {
            flex: 0 0 320px;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 20px;
            background: #f5f5f5;
            height: fit-content;
            position: sticky;
            top: 20px;
            max-height: 750px;
            overflow-y: auto;
        }

        .info-panel h2 {
            color: #333;
            margin-bottom: 15px;
            font-size: 18px;
        }

        .info-panel p {
            color: #666;
            font-size: 13px;
            line-height: 1.6;
        }

        .info-empty {
            color: #999;
            text-align: center;
            padding: 40px 20px;
        }

        .restriction-list {
            margin-top: 15px;
            list-style: none;
        }

        .restriction-list li {
            padding: 8px;
            margin: 5px 0;
            background: white;
            border-left: 3px solid #667eea;
            padding-left: 12px;
            border-radius: 3px;
            font-size: 13px;
            color: #333;
        }

        .status {
            display: inline-block;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            margin-top: 10px;
        }

        .status.critical {
            background-color: #fee;
            color: #c33;
        }

        .status.warning {
            background-color: #fef3cd;
            color: #856404;
        }

        .status.normal {
            background-color: #d4edda;
            color: #155724;
        }

        .legend {
            margin-top: 20px;
            border-top: 1px solid #ddd;
            padding-top: 15px;
        }

        .legend h3 {
            font-size: 14px;
            margin-bottom: 10px;
            color: #333;
        }

        .legend-item {
            display: flex;
            align-items: center;
            margin: 8px 0;
            font-size: 12px;
        }

        .legend-color {
            width: 20px;

            border: 1px solid #999;
            border-radius: 3px;
        }

        .legend-color.no-restrictions {

        }

        .legend-color.moderate {
            background-color: #fef3cd;
        }

        .legend-color.severe {
            background-color: #fee;
        }

        @media (max-width: 1100px) {

<body>
    <div class="container">
        <h1>🛢️ Ограничения отпуска топлива по регионам РФ</h1>
        <p class="subtitle">Актуальная информация о статусе доступности топлива в различных регионах</p>

        <div class="content">
            <div class="map-container">
                <div id="map"></div>
            </div>

            <div class="info-panel">
                <h2>📍 Информация по региону</h2>
                <div id="regionInfo" class="info-empty">
                    <p>Нажмите на регион на карте для просмотра информации об ограничениях</p>
                </div>

                <div class="legend">
                    <h3>Статус ограничений:</h3>
                    <div class="legend-item">
                        <div class="legend-color no-restrictions"></div>
                        <span>Ограничений нет</span>
                    </div>
                    <div class="legend-item">
                        <div class="legend-color moderate"></div>
                        <span>Умеренные ограничения</span>
                    </div>
                    <div class="legend-item">
                        <div class="legend-color severe"></div>
                        <span>Серьезные ограничения</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Загружаем сохранённые данные из localStorage при инициализации
        function loadSavedData() {
            const saved = localStorage.getItem('fuelRestrictionsData');
            if (saved) {
                try {
                    const savedData = JSON.parse(saved);
                    Object.assign(regionsData, savedData);
                    console.log('✓ Загружены сохранённые данные из localStorage');
                } catch (e) {
                    console.error('Ошибка при загрузке сохранённых данных:', e);
                }
            }
        }

        // Сохраняем данные в localStorage
        function saveDataToStorage() {
            localStorage.setItem('fuelRestrictionsData', JSON.stringify(regionsData));
            console.log('✓ Данные сохранены в localStorage');
        }

        // Получаем текущую дату в формате YYYY-MM-DD
        function getCurrentDate() {
            const today = new Date();
            const year = today.getFullYear();
            const month = String(today.getMonth() + 1).padStart(2, '0');
            const day = String(today.getDate()).padStart(2, '0');
            return `${year}-${month}-${day}`;
        }

        let currentEditingRegion = null;

        function showRegionInfo(regionName, data) {
            currentEditingRegion = regionName;
            
            const statusBadge = `
                <div class="status ${data.status}">
                    ${data.status === 'normal' ? '✓ Ограничений нет' : 
                      data.status === 'warning' ? '⚠ Умеренные ограничения' : 
                      '✕ Серьезные ограничения'}
                </div>
            `;

            const restrictions = data.restrictions
                .map(r => `<li>${r}</li>`)
                .join('');

            infoPanel.innerHTML = `
                <h2>📍 ${regionName}</h2>
                ${statusBadge}
                <button class="edit-button" onclick="enterEditMode('${regionName.replace(/'/g, "\\'")}')">✏️ Редактировать</button>
                <h3 style="margin-top: 15px; color: #333; font-size: 14px;">Текущие ограничения:</h3>
                <ul class="restriction-list">
                    ${restrictions}
                </ul>
                <p style="margin-top: 15px; font-size: 12px; color: #999;">
                    <strong>Контакт:</strong> ${data.phone}<br>
                    <strong>Обновлено:</strong> ${data.lastUpdate}
                </p>
            `;
        }

        function enterEditMode(regionName) {
            const data = regionsData[regionName];
            if (!data) {
                alert('Ошибка: данные региона не найдены');
                return;
            }

            const restrictionsHtml = data.restrictions
                .map((r, idx) => `
                    <div class="restriction-item">
                        <input type="text" value="${r.replace(/"/g, '&quot;')}" id="restriction-${idx}">
                        <button type="button" onclick="removeRestriction(${idx})">Удалить</button>
                    </div>
                `)
                .join('');

            const editForm = `
                <div class="edit-form">
                    <div class="form-group">
                        <label>Статус:</label>
                        <select id="edit-status">
                            <option value="normal" ${data.status === 'normal' ? 'selected' : ''}>Ограничений нет</option>
                            <option value="warning" ${data.status === 'warning' ? 'selected' : ''}>Умеренные ограничения</option>
                            <option value="critical" ${data.status === 'critical' ? 'selected' : ''}>Серьезные ограничения</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Контакт (телефон):</label>
                        <input type="text" id="edit-phone" value="${data.phone.replace(/"/g, '&quot;')}">
                    </div>

                    <div class="form-group">
                        <label>Ограничения:</label>
                        <div id="restrictions-container">
                            ${restrictionsHtml}
                        </div>
                        <button type="button" class="add-restriction-btn" onclick="addRestrictionField()">+ Добавить ограничение</button>
                    </div>

                    <div style="margin-top: 15px;">
                        <button class="save-button" onclick="saveChanges('${regionName.replace(/'/g, "\\'")}')">💾 Сохранить</button>
                        <button class="cancel-button" onclick="cancelEdit('${regionName.replace(/'/g, "\\'")}')">✕ Отменить</button>
                    </div>
                </div>
            `;

            infoPanel.innerHTML = `
                <h2>📍 ${regionName}</h2>
                <div style="color: #667eea; font-weight: bold; margin-bottom: 10px;">Режим редактирования</div>
                ${editForm}
            `;
        }

        function addRestrictionField() {
            const container = document.getElementById('restrictions-container');
            const idx = container.children.length;
            const newField = document.createElement('div');
            newField.className = 'restriction-item';
            newField.innerHTML = `
                <input type="text" value="" id="restriction-${idx}">
                <button type="button" onclick="removeRestriction(${idx})">Удалить</button>
            `;
            container.appendChild(newField);
        }

        function removeRestriction(idx) {
            const field = document.getElementById(`restriction-${idx}`);
            if (field) {
                field.parentElement.remove();
            }
        }

        function saveChanges(regionName) {
            const status = document.getElementById('edit-status').value;
            const phone = document.getElementById('edit-phone').value;
            
            const restrictions = [];
            document.querySelectorAll('.restriction-item input').forEach(input => {
                if (input.value.trim()) {
                    restrictions.push(input.value.trim());
                }
            });

            if (restrictions.length === 0) {
                alert('Добавьте хотя бы одно ограничение');
                return;
            }

            if (!phone.trim()) {
                alert('Укажите контактный телефон');
                return;
            }

            // Обновляем данные
            regionsData[regionName] = {
                status: status,
                restrictions: restrictions,
                phone: phone,
                lastUpdate: getCurrentDate()
            };

            // Сохраняем в localStorage
            saveDataToStorage();

            // Показываем обновленную информацию
            showRegionInfo(regionName, regionsData[regionName]);
            
            // Обновляем цвет региона на карте
            updateMapColors();
            
            alert('✓ Данные региона сохранены!');
        }

        function cancelEdit(regionName) {
            showRegionInfo(regionName, regionsData[regionName]);
        }

        function updateMapColors() {

            window.location.reload();
        }

        // Инициализируем страницу

            loadSavedData();
        });

        function getRegionData(geoJsonName) {
            if (!geoJsonName) return null;
            
            // Сначала пробуем прямое совпадение
            if (regionsData[geoJsonName]) {
                console.log('✓ Прямое совпадение:', geoJsonName);
                return geoJsonName;
            }
            // Затем пробуем через маппинг
            if (regionNameMap[geoJsonName]) {
                console.log('✓ Найдено через маппинг:', geoJsonName, '->', regionNameMap[geoJsonName]);
                return regionNameMap[geoJsonName];
            }
            
            // Пробуем нормализованный поиск (игнорируем регистр и пробелы)
            const normalized = geoJsonName.trim().toLowerCase();
            for (const [key, value] of Object.entries(regionNameMap)) {
                if (key.toLowerCase() === normalized) {
                    console.log('✓ Найдено через нормализацию:', geoJsonName, '->', value);
                    return value;
                }
            }
            
            // Пробуем частичное совпадение (если одна из частей совпадает)
            const parts = normalized.split(/\s+/);
            for (const part of parts) {
                if (part.length > 3) {
                    for (const [key, value] of Object.entries(regionNameMap)) {
                        if (key.toLowerCase().includes(part)) {
                            console.log('✓ Найдено через частичное совпадение:', geoJsonName, '(по слову "' + part + '") ->', value);
                            return value;
                        }
                    }
                }
            }
            
            // Если ничего не найдено, логируем для отладки
            console.log('❌ Регион НЕ найден:', geoJsonName);
            return null;
        }

        const infoPanel = document.getElementById('regionInfo');

        // Загружаем Natural Earth GeoJSON с нормальными границами регионов
        console.log('Загружаем Natural Earth GeoJSON...');
        fetch('https://raw.githubusercontent.com/nvkelso/natural-earth-vector/master/geojson/ne_10m_admin_1_states_provinces.geojson')
            .then(response => response.json())
            .then(geojson => {
                const russiaRegions = geojson.features.filter(f => f.properties.admin === 'Russia');
                console.log('✓ Natural Earth GeoJSON загружена, регионов России:', russiaRegions.length);

                L.geoJSON(russiaRegions, {
                    style: function(feature) {
                        const geoJsonName = feature.properties.name;
                        const mappedName = getRegionData(geoJsonName);
                        const data = mappedName ? regionsData[mappedName] : null;
                        const color = data ? statusColors[data.status] : '#e0e0e0';

                        return {
                            fillColor: color,
                            weight: 2,
                            opacity: 1,
                            color: '#333',
                            fillOpacity: 0.7
                        };
                    },
                    onEachFeature: function(feature, layer) {
                        const geoJsonName = feature.properties.name;
                        const mappedName = getRegionData(geoJsonName);
                        const data = mappedName ? regionsData[mappedName] : null;

                        if (data && mappedName) {
                            layer.bindPopup(`<div class="popup-content">
                                <strong>${mappedName}</strong>
                                <br>Статус: ${data.status === 'normal' ? 'Ограничений нет' : 
                                             data.status === 'warning' ? 'Умеренные ограничения' : 
                                             'Серьезные ограничения'}
                            </div>`);
                            
                            layer.on('click', function() {
                                showRegionInfo(mappedName, data);
                            });

                            layer.on('mouseover', function() {
                                layer.setStyle({ weight: 3, fillOpacity: 0.9 });
                                layer.bringToFront();
                            });

                            layer.on('mouseout', function() {
                                layer.setStyle({ weight: 2, fillOpacity: 0.7 });
                            });
                        }
                    }
                }).addTo(map);
            })
            .catch(error => {
                console.error('Ошибка загрузки GeoJSON:', error);
            });

        // Клик на карту вне региона - скрыть информацию
        map.on('click', function(e) {
            // Проверяем, был ли клик на объект
            if (e.target.feature === undefined) {
                infoPanel.innerHTML = `
                    <h2>📍 Информация по региону</h2>
                    <div class="info-empty">
                        <p>Нажмите на регион на карте для просмотра информации</p>
                    </div>
                `;
            }
        });
